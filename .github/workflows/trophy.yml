name: Generate GitHub Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate trophies
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: 77anuj77
          output_path: trophy-dist/github-trophies.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: radical

      - name: Push trophies to trophy-output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: trophy-output
          build_dir: trophy-dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
